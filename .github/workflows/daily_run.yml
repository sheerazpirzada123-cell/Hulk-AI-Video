name: Daily AI Video
on:
  schedule:
    - cron: '0 0 * * *' # Har raat 12 baje
  workflow_dispatch: # Manual button ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

     - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install --upgrade pip
          pip install google-generativeai edge-tts moviepy==1.0.3 requests

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Save Video
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Hulk-Video
          path: hulk_funny_final.mp4
