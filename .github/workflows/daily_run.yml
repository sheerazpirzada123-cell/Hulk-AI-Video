name: Daily AI Video
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install --upgrade pip
          pip install edge-tts requests moviepy==1.0.3 decorator==4.4.2

      - name: Run Free AI Script
        run: python main.py

      - name: Save Video
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Hulk-Video
          path: hulk_funny_final.mp4
