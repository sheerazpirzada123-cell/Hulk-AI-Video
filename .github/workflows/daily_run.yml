name: Automatic Hulk Bot
on:
  workflow_dispatch: # Sirf button dabane par chalega

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts requests moviepy==1.0.3 Pillow imageio[pyav] imageio-ffmpeg

      - name: Run Automation
        run: python main.py

      - name: Download Video Here
        uses: actions/upload-artifact@v4
        with:
          name: Hulk-Bot-Video
          path: hulk_pakistani_ammi.mp4
