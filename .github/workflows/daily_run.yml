name: Pakistani Hulk Bot ElevenLabs
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install All Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install requests moviepy==1.0.3 Pillow imageio[pyav] imageio-ffmpeg

      - name: Run Bot
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python main.py

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Hulk-Pakistani-Video
          path: hulk_bot_final.mp4
